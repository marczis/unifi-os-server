---
services:
  unifi-os-server:
    image: ghcr.io/lemker/unifi-os-server:latest
    container_name: unifi-os-server
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      host.docker.internal: host-gateway
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      #- UOS_SYSTEM_IP=192.168.1.6
      - UOS_SYSTEM_IP=wifi.sammy.local
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./unifi-os-server/persistent:/persistent
      - ./unifi-os-server/var-log:/var/log
      - ./unifi-os-server/data:/data
      - ./unifi-os-server/srv:/srv
      - ./unifi-os-server/var-lib-unifi:/var/lib/unifi
      - ./unifi-os-server/var-lib-mongodb:/var/lib/mongodb
      - ./unifi-os-server/etc-rabbitmq-ssl:/etc/rabbitmq/ssl
    ports:
      - 11443:443
      - 5005:5005 # Optional
      - 9543:9543 # Optional
      - 6789:6789 # Optional
      - 8080:8080
      - 8443:8443 # Optional
      - 8444:8444 # Optional
      - 3478:3478/udp
      - 5514:5514/udp # Optional
      - 10003:10003/udp
      - 11084:11084 # Optional
      - 5671:5671 # Optional
      - 8880:8880 # Optional
      - 8881:8881 # Optional
      - 8882:8882 # Optional
    restart: unless-stopped
